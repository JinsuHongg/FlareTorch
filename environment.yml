name: flaretorch
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python>=3.11
  - pip>=21.8
  - pytorch>=2.0
  - torchvision>=0.15
  - torchaudio>=2.0
  - cuda-toolkit>=12.1
  - curvlinops-for-pytorch>=2.0,<3.0
  - dask>=2025.11.0
  - datasets>=4.4.1
  - hydra-core>=1.3.2
  - loguru>=0.7.3
  - transformers>=4.36.0
  - pip:
      - torchmetrics>=1.0
      - laplace-torch>=0.2.2.2
      - zarr
      - "terratorch>=1.1.1"
      - "terratorch-surya>=0.1.0"

optional-dependencies:
  dev:
    - pip:
        - pytest>=8.0
        - pytest-cov>=4.0
        - ruff>=0.2
        - mypy>=1.8
        - pre-commit>=3.0