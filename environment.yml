name: flaretorch
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.11
  - curvlinops-for-pytorch<3.0
  - dask>=2025.11.0
  - datasets>=4.4.1
  - hydra-core>=1.3.2
  - loguru>=0.7.3
  - transformers>=4.36.0
  - pip:
      - .
      - terratorch>=1.1.1
      - terratorch-surya>=0.1.0
      - laplace-torch>=0.2.2.2

optional-dependencies:
  dev:
    - pytest>=8.0
    - pytest-cov>=4.0
    - ruff>=0.2
    - mypy>=1.8
    - pre-commit>=3.0
